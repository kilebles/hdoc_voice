name: hdoc-voice

services:
  bot:
    build:
      context: .
      target: runtime
    image: hdoc-voice:latest
    restart: unless-stopped
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s
    volumes:
      - ./logs:/app/logs
